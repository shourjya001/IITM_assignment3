<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Dashboard v2</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            overflow: hidden;
        }

        .glass-panel {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 15px;
            border: 2px solid #00ffcc;
            padding: 60px;
            text-align: center;
            box-shadow: 0 0 20px #00ffcc, inset 0 0 20px rgba(0, 255, 204, 0.2);
            max-width: 550px;
            width: 100%;
            position: relative;
        }

        h1 {
            font-size: 2.8rem;
            margin-bottom: 15px;
            color: #fff;
            text-shadow: 0 0 10px #00ffcc;
            letter-spacing: 2px;
        }

        .version-badge {
            display: inline-block;
            background: #00ffcc;
            color: #000;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 1.5rem;
            font-weight: bold;
            margin: 25px 0;
            box-shadow: 0 0 15px #00ffcc;
            animation: pulse-badge 2s infinite;
        }

        @keyframes pulse-badge {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .status {
            font-size: 1.2rem;
            color: #00ffcc;
            margin-top: 25px;
            border-top: 1px dashed #00ffcc;
            padding-top: 20px;
        }

        .pulse {
            display: inline-block;
            width: 15px;
            height: 15px;
            background-color: #ff00ff;
            border-radius: 50%;
            margin-right: 10px;
            box-shadow: 0 0 15px #ff00ff;
        }
    </style>
</head>
<body>
    <div class="glass-panel">
        <h1>Application Dashboard</h1>
        <div class="version-badge">VERSION 2.0 🚀</div>
        <div class="status">
            <span class="pulse"></span> Rollout Complete. System Upgraded.
        </div>
    </div>
</body>
</html>
