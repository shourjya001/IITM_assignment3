apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-dashboard-deployment
  labels:
    app: iitm-web
spec:
  replicas: 3
  selector:
    matchLabels:
      app: iitm-web
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: iitm-web
    spec:
      containers:
      - name: web-dashboard
        image: shourjya001/iitm-app:v1
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        
        # Ensures the app has fully started before taking traffic
        startupProbe:
          httpGet:
            path: /
            port: 80
          failureThreshold: 20
          periodSeconds: 5
        
        # Ensures the app is ready to receive traffic
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
        
        # Ensures the app is healthy and running
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 15
          periodSeconds: 20
